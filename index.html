<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mở Bao Lì Xì May Mắn</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #fdf2f2;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #d63031;
            text-shadow: 1px 1px 2px #fab1a0;
        }

        /* Grid 2 hàng ngang (5 cột) */
        .container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 25px;
            max-width: 900px;
            margin-top: 40px;
        }

        /* Thiết kế bao lì xì bằng CSS */
        .lixi-box {
            width: 130px;
            height: 180px;
            background: #d63031;
            border-radius: 8px;
            position: relative;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Nắp bao lì xì */
        .lixi-box::before {
            content: "";
            position: absolute;
            top: 0;
            width: 100%;
            height: 40px;
            background: #b71c1c;
            border-radius: 0 0 50% 50%;
            z-index: 2;
            transition: transform 0.4s;
        }

        /* Chữ trên bao lì xì */
        .lixi-box .symbol {
            color: #f1c40f;
            font-size: 40px;
            font-weight: bold;
            z-index: 1;
            text-shadow: 1px 1px 0px #947a0a;
        }

        .lixi-box:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        /* Khi đã mở */
        .lixi-box.opened {
            background: #fff;
            border: 2px solid #d63031;
            cursor: default;
            transform: rotateY(360deg);
        }

        .lixi-box.opened::before {
            transform: translateY(-40px); /* Mở nắp */
        }

        .lixi-box.opened .reward {
            display: block;
            color: #2d3436;
            font-size: 28px;
            font-weight: bold;
            animation: fadeIn 0.5s;
        }

        .lixi-box.opened .symbol {
            display: none;
        }

        .reward { display: none; }

        #status {
            margin-top: 30px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #d63031;
            height: 40px;
        }

        button {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 1rem;
            background: #d63031;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        button:hover { background: #ff7675; }

        /* Mobile: Chuyển thành 2 cột để dễ nhìn */
        @media (max-width: 700px) {
            .container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1>🧧 LÌ XÌ MAY MẮN 🧧</h1>
    <div id="status">Chọn một bao lì xì để xem điều bất ngờ!</div>

    <div class="container" id="lixiContainer">
        </div>

    <button onclick="location.reload()">Làm mới lượt chơi</button>

    <script>
        // Danh sách giải thưởng
        const rewards = ['10k', '20k', '50k', '10k', '20k', '10k', '50k', '20k', '10k', '10k'];
        
        // Trộn ngẫu nhiên
        const shuffledRewards = rewards.sort(() => Math.random() - 0.5);
        
        const container = document.getElementById('lixiContainer');
        const statusText = document.getElementById('status');

        // Tạo 10 bao lì xì
        for (let i = 0; i < 10; i++) {
            const box = document.createElement('div');
            box.className = 'lixi-box';
            box.innerHTML = `<div class="symbol">福</div><div class="reward">${shuffledRewards[i]}</div>`;
            box.onclick = () => {
                if (!box.classList.contains('opened')) {
                    box.classList.add('opened');
                    statusText.innerText = `Chúc mừng bạn nhận được ${shuffledRewards[i]}!`;
                }
            };
            container.appendChild(box);
        }
    </script>
</body>
</html>
