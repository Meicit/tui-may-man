<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lì Xì Chúc Mừng Năm Mới</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #d63031;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            max-width: 900px;
            margin-top: 30px;
        }

        /* Thiết kế bao lì xì */
        .lixi-box {
            width: 130px;
            height: 190px;
            background: #d63031;
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid #b71c1c;
        }

        /* Nắp bao lì xì */
        .lixi-box::before {
            content: "";
            position: absolute;
            top: 0;
            width: 100%;
            height: 45px;
            background: #b71c1c;
            border-radius: 0 0 50% 50%;
            z-index: 2;
            transition: transform 0.4s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Chữ Chúc Mừng Năm Mới xếp dọc */
        .lixi-box .text-gold {
            color: #f1c40f;
            font-size: 16px;
            font-weight: bold;
            z-index: 1;
            text-align: center;
            line-height: 1.4;
            text-shadow: 1px 1px 0px #947a0a;
            padding: 0 10px;
            margin-top: 20px;
        }

        .lixi-box:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 25px rgba(214, 48, 49, 0.4);
        }

        /* Trạng thái mở */
        .lixi-box.opened {
            background: #fff;
            border: 3px solid #f1c40f;
            transform: scale(1.05);
        }

        .lixi-box.opened::before {
            transform: translateY(-50px);
        }

        .lixi-box.opened .reward {
            display: block;
            color: #d63031;
            font-size: 32px;
            font-weight: 800;
            animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 3;
        }

        .lixi-box.opened .text-gold {
            display: none;
        }

        .reward { display: none; }

        #status {
            margin-top: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #b71c1c;
            height: 30px;
        }

        .btn-reset {
            margin-top: 30px;
            padding: 12px 25px;
            background: #f1c40f;
            color: #b71c1c;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #947a0a;
        }

        .btn-reset:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        @keyframes popUp {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 700px) {
            .container { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <h1>🧧 KHAI XUÂN NHẬN LỘC 🧧</h1>
    <div id="status">Hãy chọn một bao lì xì may mắn!</div>

    <div class="container" id="lixiContainer"></div>

    <button class="btn-reset" onclick="location.reload()">LÀM MỚI LƯỢT CHƠI</button>

    <script>
        const rewards = ['10k', '20k', '50k', '10k', '20k', '10k', '50k', '20k', '10k', '10k'];
        const shuffledRewards = rewards.sort(() => Math.random() - 0.5);
        const container = document.getElementById('lixiContainer');
        const statusText = document.getElementById('status');

        for (let i = 0; i < 10; i++) {
            const box = document.createElement('div');
            box.className = 'lixi-box';
            // Chèn chữ Chúc Mừng Năm Mới xuống dòng để đẹp hơn
            box.innerHTML = `
                <div class="text-gold">CHÚC<br>MỪNG<br>NĂM<br>MỚI</div>
                <div class="reward">${shuffledRewards[i]}</div>
            `;
            box.onclick = () => {
                if (!box.classList.contains('opened')) {
                    box.classList.add('opened');
                    statusText.innerText = `🧧 Chúc mừng! Bạn nhận được ${shuffledRewards[i]}`;
                }
            };
            container.appendChild(box);
        }
    </script>
</body>
</html>
